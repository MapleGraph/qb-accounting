syntax = "proto3";

package user;

option go_package = "qb-accounting/internal/proto/employee";

// UserService provides user management from qb-employee
service UserService {
  rpc SetupOrganization (SetupOrganizationRequest) returns (SetupOrganizationResponse);
  rpc AddUser (AddUserRequest) returns (AddUserResponse);
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message User {
  string uuid = 1;
  string organization_id = 2;
  string department_id = 3;
  string user_type = 4;
  string first_name = 5;
  string last_name = 6;
  string email = 7;
  string mobile = 8;
  string password = 9;
  int32 is_active = 10;
  repeated string roles = 11;
}

message SetupOrganizationRequest {
  string organization_id = 1;
  string user_type = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string mobile = 6;
  string password = 7;
}

message SetupOrganizationResponse {
  string user_id = 1;
}

message AddUserRequest {
  string organization_id = 1;
  string user_type = 2;
  string first_name = 3;
  string last_name = 4;
  string email = 5;
  string mobile = 6;
  string password = 7;
  string role = 8;
}

message AddUserResponse {
  User user = 1;
}

message GetUserRequest {
  string uuid = 1;
}

message GetUserResponse {
  User user = 1;
}
